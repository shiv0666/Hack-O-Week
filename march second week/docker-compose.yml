services:
  mongo:
    image: mongo:7
    container_name: telemetry-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telemetry-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: healthTelemetry
      MONGODB_COLLECTION_NAME: telemetry
      TELEMETRY_AES_KEY_BASE64: ${TELEMETRY_AES_KEY_BASE64}
    depends_on:
      - mongo
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telemetry-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:
